<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>エフ・キャンカップ 謎解きマッチング</title>
    <meta
      name="description"
      content="スマホで謎を解きながら函館の企業ヒーローと出会う、エフ・キャンカップの会場向けマッチングクエスト。"
    />
    <meta name="theme-color" content="#f5c542" />
    <meta property="og:title" content="エフ・キャンカップ 謎解きマッチング" />
    <meta
      property="og:description"
      content="サッカー会場で企業ヒーローを呼び覚ます、学生向け謎解きマッチングサイト。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="assets/hero-quest-map.jpg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scroll-meter" aria-hidden="true"><span></span></div>
    <header class="site-header" data-elevated="false">
      <a class="brand" href="#home" aria-label="トップへ">
        <span class="brand-mark">F</span>
        <span>
          <strong>F-CAN CUP</strong>
          <small>Hero Match Quest</small>
        </span>
      </a>
      <nav class="main-nav" aria-label="メインナビゲーション">
        <a href="#profile">受付</a>
        <a href="#story">物語</a>
        <a href="#missions">任務</a>
        <a href="#companies">企業</a>
        <a href="#clear">完了</a>
      </nav>
    </header>

    <main id="app"></main>

    <template id="home-template">
      <section class="hero">
        <img
          class="hero-visual"
          src="assets/hero-quest-map.jpg"
          alt="サッカー会場で謎解きマップを持つ学生と企業ブースのイラスト"
          width="1024"
          height="1536"
        />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <p class="eyebrow">函館から始まる企業ヒーロー発見ゲーム</p>
          <h1>エフ・<br class="phone-only" />キャン<br class="phone-only" />カップ</h1>
          <p class="hero-copy">
            サッカー会場に隠された謎を解き、<br class="phone-only" />街を支える企業ヒーローの<br class="phone-only" />正体を呼び覚ませ。
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#profile">参加受付をする</a>
            <a class="button secondary" href="#story">謎解きを始める</a>
          </div>
          <dl class="event-strip" aria-label="イベント概要">
            <div>
              <dt>日時</dt>
              <dd>2026 Summer</dd>
            </div>
            <div>
              <dt>会場</dt>
              <dd>函館フットボールパーク</dd>
            </div>
            <div>
              <dt>対象</dt>
              <dd>高校生・大学生・保護者</dd>
            </div>
          </dl>
        </div>
        <div class="scroll-cue" aria-hidden="true">会場マップを進む</div>
      </section>

      <section class="section intro-band">
        <div class="section-inner intro-grid">
          <div>
            <p class="eyebrow dark">MATCHING QUEST</p>
            <h2>謎解きで、会社との出会いを少しだけ面白くする。</h2>
          </div>
          <p>
            企業HPや会場ブースに散らばる情報を調べると、ヒーロー名、仕事の強み、街との関わりが見えてくる。
            正解すると企業紹介が解放され、気になった企業をあとでまとめて確認できます。
          </p>
        </div>
      </section>

      <section class="section">
        <div class="section-inner">
          <div class="section-heading">
            <p class="eyebrow dark">TODAY'S FLOW</p>
            <h2>会場での流れ</h2>
          </div>
          <div class="flow">
            <article class="reveal">
              <span>01</span>
              <h3>物語を読む</h3>
              <p>未来の函館に迫る危機と、企業ヒーローの失われた力を知る。</p>
            </article>
            <article class="reveal">
              <span>02</span>
              <h3>企業を調べる</h3>
              <p>仕事、技術、街への役割をヒントに謎の答えへ近づく。</p>
            </article>
            <article class="reveal">
              <span>03</span>
              <h3>ブースへ行く</h3>
              <p>興味を持った企業にチェックを入れて、当日の会話につなげる。</p>
            </article>
          </div>
        </div>
      </section>
    </template>

    <template id="profile-template">
      <section class="page-hero compact register-hero">
        <div class="page-hero-inner">
          <p class="eyebrow">CHECK IN</p>
          <h1>参加受付と<br />マイページ</h1>
          <p>この端末だけに保存します。<br />DBには送信しません。</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner" id="profile-view"></div>
      </section>
    </template>

    <template id="story-template">
      <section class="page-hero story-hero">
        <div class="page-hero-inner">
          <p class="eyebrow">STORY</p>
          <h1>忘れられた企業ヒーローを、もう一度フィールドへ。</h1>
          <p>
            未来の函館に巨大怪獣が出現。街を守っていた企業ヒーローたちは、名前も仕事も忘れられ、力を失っていた。
          </p>
        </div>
      </section>
      <section class="section story-section">
        <div class="section-inner story-layout">
          <div class="story-copy">
            <h2>君のスマホと知恵が、街の力になる。</h2>
            <p>
              ヒーローの正体は、函館の暮らしを支える企業たち。建物の骨組み、健康、まちづくり、船、設備、産業技術。
              それぞれの仕事を調べ、隠されたキーワードを導き出すことで、ヒーローの力が戻っていく。
            </p>
            <p>
              全てのヒーローが集まったとき、フィールド中央に最後の光が灯る。
            </p>
            <a class="button primary" href="#missions">ミッションを開始する</a>
          </div>
          <div class="signal-panel" aria-label="ヒーロー信号">
            <div class="signal-ring"></div>
            <div class="signal-core">HERO<br />CALL</div>
          </div>
        </div>
      </section>
    </template>

    <template id="missions-template">
      <section class="page-hero compact">
        <div class="page-hero-inner">
          <p class="eyebrow">MISSIONS</p>
          <h1>企業ヒーローを<br />呼び覚ませ</h1>
          <p>難易度を選んで挑戦。<br />正解すると<br />企業紹介が解放されます。</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div class="mission-toolbar">
            <div>
              <strong id="progress-label">0 / 6 clear</strong>
              <span>集めたヒーロー</span>
            </div>
            <button class="button ghost" data-action="reset">進行をリセット</button>
          </div>
          <div id="mission-grid" class="mission-grid"></div>
        </div>
      </section>
    </template>

    <template id="mission-template">
      <section class="section mission-page">
        <div class="section-inner mission-detail" id="mission-detail"></div>
      </section>
    </template>

    <template id="companies-template">
      <section class="page-hero compact trusted">
        <div class="page-hero-inner">
          <p class="eyebrow">COMPANIES</p>
          <h1>街を支える企業を知る</h1>
          <p>謎解きで気になった会社は、ブースで直接話を聞いてみよう。</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div id="company-list" class="company-list"></div>
        </div>
      </section>
    </template>

    <template id="company-template">
      <section class="section">
        <div class="section-inner company-detail" id="company-detail"></div>
      </section>
    </template>

    <template id="clear-template">
      <section class="page-hero clear-hero">
        <div class="page-hero-inner">
          <p class="eyebrow">FINAL</p>
          <h1 id="clear-title">ヒーロー集結まで、あと少し。</h1>
          <p id="clear-copy">ミッションをクリアして、フィールド中央の光を完成させよう。</p>
          <a class="button primary" href="#missions">ミッションへ戻る</a>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div id="hero-collection" class="hero-collection"></div>
          <form class="match-form" id="match-form">
            <div class="section-heading">
              <p class="eyebrow dark">NEXT ACTION</p>
              <h2>気になった企業を残す</h2>
            </div>
            <label>
              名前
              <input name="name" autocomplete="name" placeholder="例: 山田 太郎" />
            </label>
            <label>
              学校名
              <input name="school" placeholder="例: 函館○○高校" />
            </label>
            <label>
              希望する接点
              <select name="contact">
                <option>当日ブースで話したい</option>
                <option>後日説明を聞きたい</option>
                <option>インターン情報がほしい</option>
                <option>会社見学に興味がある</option>
              </select>
            </label>
            <label>
              自由記述
              <textarea name="comment" rows="4" placeholder="気になった仕事や質問を書いてください"></textarea>
            </label>
            <button class="button primary" type="submit">結果を保存する</button>
            <p class="form-note" id="form-note" role="status"></p>
          </form>
        </div>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
