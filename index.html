    <template id="home-template">
      <section class="hero">
        <img
          class="hero-visual"
          src="assets/hero-quest-map.jpg"
          alt="サッカー会場で謎解きマップを持つ学生と企業ブースのイラスト"
          width="1024"
          height="1536"
        />
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <p class="eyebrow">函館から始まる企業ヒーロー発見ゲーム</p>
          <h1>エフ・<br class="phone-only" />キャン<br class="phone-only" />カップ</h1>
          <p class="hero-copy">
            サッカー会場に隠された謎を解き、<br class="phone-only" />街を支える企業ヒーローの<br class="phone-only" />正体を呼び覚ませ。
          </p>
          <div class="hero-actions">
            <a class="button primary" href="#profile">参加受付をする</a>
            <a class="button secondary" href="#story">謎解きを始める</a>
          </div>
          <dl class="event-strip" aria-label="イベント概要">
            <div>
              <dt>日時</dt>
              <dd>2026 Summer</dd>
            </div>
            <div>
              <dt>会場</dt>
              <dd>函館フットボールパーク</dd>
            </div>
            <div>
              <dt>対象</dt>
              <dd>高校生・大学生・保護者</dd>
            </div>
          </dl>
          <p class="emergency-log">緊急通信を受信中... ナゾゴラ接近。企業ヒーローの記憶を復元してください。</p>
        </div>
        <div class="scroll-cue" aria-hidden="true">会場マップを進む</div>
      </section>

      <section class="section intro-band">
        <div class="section-inner intro-grid">
          <div>
            <p class="eyebrow dark">MATCHING QUEST</p>
            <h2>謎解きで、会社との出会いを少しだけ面白くする。</h2>
          </div>
          <p>
            企業HPや会場ブースに散らばる情報を調べると、ヒーロー名、仕事の強み、街との関わりが見えてくる。
            謎を解くほど、忘れられた企業ヒーローの記憶が戻り、最後の決戦へ近づいていきます。
          </p>
        </div>
      </section>

      <section class="section">
        <div class="section-inner">
          <div class="section-heading">
            <p class="eyebrow dark">TODAY'S FLOW</p>
            <h2>会場での流れ</h2>
          </div>
          <div class="flow">
            <article class="reveal">
              <span>01</span>
              <h3>物語を読む</h3>
              <p>未来の函館に迫る危機と、企業ヒーローの失われた力を知る。</p>
            </article>
            <article class="reveal">
              <span>02</span>
              <h3>企業を調べる</h3>
              <p>企業HPや会場ブースを手がかりに、仕事・技術・街との関わりを探る。</p>
            </article>
            <article class="reveal">
              <span>03</span>
              <h3>謎を解く</h3>
              <p>見つけた情報を使って、ヒーロー解放コードを導き出す。</p>
            </article>
            <article class="reveal">
              <span>04</span>
              <h3>ブースへ行く</h3>
              <p>気になった企業にチェックを入れ、会場で直接話を聞く。</p>
            </article>
            <article class="reveal">
              <span>05</span>
              <h3>ヒーロー解放</h3>
              <p>正解すると企業紹介が開き、ヒーローが仲間になる。</p>
            </article>
          </div>
        </div>
      </section>

    <template id="story-template">
      <section class="story-prologue">
        <div class="section-inner story-prologue-grid">
          <div class="story-prologue-copy">
            <p class="eyebrow">PROLOGUE / HAKODATE 20XX</p>
            <h1>西暦20XX年、未来の函館に警報が鳴る。</h1>
            <p>
              かつて平和だった街は、突如として現れた巨大怪獣によって破壊され、絶望の淵に立たされていた。
              建物はなぎ倒され、五稜郭も、函館山もピンチに陥っている。
            </p>
            <div class="story-hero-actions">
              <a class="button primary" href="#missions">ヒーロー捜索を開始する</a>
              <a class="button secondary" href="#story-call">緊急通信を読む</a>
            </div>
          </div>
          <aside class="crisis-board" aria-label="函館危機状況">
            <div class="crisis-stamp">CITY ALERT</div>
            <svg class="crisis-kaiju" viewBox="0 0 220 240" aria-hidden="true">
              <use href="#kaiju-nazogora"></use>
            </svg>
            <dl>
              <div>
                <dt>五稜郭</dt>
                <dd>防衛線、崩壊寸前</dd>
              </div>
              <div>
                <dt>函館山</dt>
                <dd>通信塔にノイズ発生</dd>
              </div>
              <div>
                <dt>市街地</dt>
                <dd>建物・ライフライン停止</dd>
              </div>
            </dl>
          </aside>
        </div>
      </section>

      <section class="section story-section story-chapter-band">
        <div class="section-inner">
          <div class="story-chapter-heading">
            <p class="eyebrow dark">STORY 01</p>
            <h2>街は、ヒーローの名前を忘れていた。</h2>
            <p>
              最新鋭の兵器すら通用しない状況の中で、街の人々は怯えるしかなかった。
              本当に必要だった力は、ずっと前から函館を支えていた。
            </p>
          </div>
          <div class="story-scenes">
            <article class="story-scene reveal">
              <span>01</span>
              <h3>巨大怪獣、出現</h3>
              <p>ナゾゴラの一撃で街の機能が止まる。建物、道路、港、ライフラインが次々と沈黙していく。</p>
            </article>
            <article class="story-scene reveal">
              <span>02</span>
              <h3>忘れられた伝説</h3>
              <p>かつて函館には、街の命、建物、健康を影から支え続けてきた伝説のヒーローたちがいた。</p>
            </article>
            <article class="story-scene reveal">
              <span>03</span>
              <h3>失われたエネルギー</h3>
              <p>ヒーローの力の源は、人々の記憶と感謝の絆。忘れ去られた彼らは、街のどこかで眠っている。</p>
            </article>
          </div>
        </div>
      </section>

      <section class="section story-section" id="story-call">
        <div class="section-inner story-layout story-call-layout">
          <article class="partner-terminal">
            <p class="eyebrow dark">STORY 02 / ENCRYPTED CALL</p>
            <h2>謎の暗号通信が、君のスマホに届いた。</h2>
            <div class="terminal-screen">
              <div class="terminal-status">
                <span></span>
                <strong>PARTNER SIGNAL</strong>
                <em>解析中...</em>
              </div>
              <div class="partner-message">
                <div class="partner-avatar" aria-hidden="true">P</div>
                <blockquote>
                  <p>おい、そこのお前たち！聞こえるか！？</p>
                  <p>
                    街の奴らはみんな忘れちまったが、俺だけは覚えている。
                    かつてこの函館には、街の命を、建物を、健康を支えてくれた本物のヒーローたちがいたんだ！
                  </p>
                  <p>
                    怪獣を倒すには、奴らの力が必要だ。お前たちの知恵とスマホの力で、
                    失われたヒーローの本当の姿を突き止め、もう一度この街にスカウトしてくれ！
                  </p>
                </blockquote>
              </div>
            </div>
          </article>
          <div class="signal-panel character-signal story-signal" aria-label="ヒーロー信号">
            <svg class="signal-kaiju" viewBox="0 0 220 240" aria-hidden="true">
              <use href="#kaiju-nazogora"></use>
            </svg>
            <div class="signal-ring"></div>
            <div class="signal-heroes" aria-hidden="true">
              <svg viewBox="0 0 200 220"><use href="#hero-steel"></use></svg>
              <svg viewBox="0 0 200 220"><use href="#hero-health"></use></svg>
              <svg viewBox="0 0 200 220"><use href="#hero-city"></use></svg>
            </div>
            <div class="signal-core">HERO<br />CALL</div>
          </div>
        </div>
      </section>

      <section class="section scout-section">
        <div class="section-inner">
          <div class="story-chapter-heading">
            <p class="eyebrow dark">STORY 03 / SCOUT ORDER</p>
            <h2>6人の企業ヒーローを、この順番で仲間に入れろ。</h2>
            <p>
              企業HPや会場ブースを調べ、ヒーローの本当の姿を復元する。
              全員がそろった時、最後のエネルギー砲が起動する。
            </p>
          </div>
          <div class="scout-order" aria-label="ヒーロースカウト順">
            <article class="scout-card reveal" style="--accent:#e95b3c">
              <span>01</span>
              <svg viewBox="0 0 200 220" aria-hidden="true"><use href="#hero-steel"></use></svg>
              <h3>ショウダイ</h3>
              <p>鉄筋・骨組みの力。怪獣の強烈な一撃を完全に防ぐ最強の盾。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#168c9a">
              <span>02</span>
              <svg viewBox="0 0 200 220" aria-hidden="true"><use href="#hero-health"></use></svg>
              <h3>チュウオウ</h3>
              <p>医療・調剤・回復の力。街の人々とヒーローを癒やす聖なるヒーラー。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#22a65a">
              <span>03</span>
              <svg viewBox="0 0 200 220" aria-hidden="true"><use href="#hero-city"></use></svg>
              <h3>モリカワ</h3>
              <p>土木・建築・土台の力。地盤を固め、怪獣の足元を崩すグラウンドマスター。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#2676a6">
              <span>04</span>
              <svg viewBox="0 0 200 220" aria-hidden="true"><use href="#hero-harbor"></use></svg>
              <h3>ハコダテドック</h3>
              <p>造船・巨大メカの力。海から超巨大決戦兵器を起動する。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#f5b82e">
              <span>05</span>
              <svg viewBox="0 0 200 220" aria-hidden="true"><use href="#hero-lifeline"></use></svg>
              <h3>タイメイ</h3>
              <p>管工事・水気の力。街の水と空気を操り、怪獣を翻弄する流体の魔術師。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#ef7b2d">
              <span>06</span>
              <svg viewBox="0 0 200 220" aria-hidden="true"><use href="#hero-industrial"></use></svg>
              <h3>トウコウ</h3>
              <p>電気・通信・情報の力。全ヒーローをつなぐ超高出力エネルギー砲。</p>
            </article>
          </div>
          <div class="operation-card">
            <p class="eyebrow dark">MISSION START</p>
            <h2>調べることが、街を救う力になる。</h2>
            <p>
              企業の仕事、技術、街との関わりを調査しよう。謎を解くたびに、忘れられたヒーローの記憶が戻っていく。
            </p>
            <a class="button primary" href="#missions">ミッション一覧へ進む</a>
          </div>
        </div>
      </section>
    </template>

    <template id="missions-template">
      <section class="page-hero compact">
        <div class="page-hero-inner">
          <p class="eyebrow">MISSIONS</p>
          <h1>企業ヒーローを<br />呼び覚ませ</h1>
          <p>難易度を選んで挑戦。<br />正解すると<br />企業紹介が解放されます。</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div class="mission-toolbar">
            <div>
              <strong id="progress-label">0 / 6 clear</strong>
              <span>集めたヒーロー</span>
            </div>
            <button class="button ghost" data-action="reset">進行をリセット</button>
          </div>
          <div id="mission-grid" class="mission-grid"></div>
        </div>
      </section>
    </template>

    <template id="mission-template">
      <section class="section mission-page">
        <div class="section-inner mission-detail" id="mission-detail"></div>
      </section>
    </template>

    <template id="companies-template">
      <section class="page-hero compact trusted">
        <div class="page-hero-inner">
          <p class="eyebrow">COMPANIES</p>
          <h1>街を支える企業を知る</h1>
          <p>謎解きで気になった会社は、ブースで直接話を聞いてみよう。</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div id="company-list" class="company-list"></div>
        </div>
      </section>
    </template>

    <template id="company-template">
      <section class="section">
        <div class="section-inner company-detail" id="company-detail"></div>
      </section>
    </template>

    <template id="clear-template">
      <section class="page-hero clear-hero">
        <div class="page-hero-inner">
          <p class="eyebrow">FINAL</p>
          <h1 id="clear-title">ヒーロー集結まで、あと少し。</h1>
          <p id="clear-copy">ミッションをクリアして、フィールド中央の光を完成させよう。</p>
          <a class="button primary" href="#missions">ミッションへ戻る</a>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div id="hero-collection" class="hero-collection"></div>
          <div id="battle-stage" class="battle-stage"></div>
          <form class="match-form" id="match-form">
            <div class="section-heading">
              <p class="eyebrow dark">NEXT ACTION</p>
              <h2>気になった企業を残す</h2>
            </div>
            <label>
              名前
              <input name="name" autocomplete="name" placeholder="例: 山田 太郎" />
            </label>
            <label>
              学校名
              <input name="school" placeholder="例: 函館○○高校" />
            </label>
            <label>
              希望する接点
              <select name="contact">
                <option>当日ブースで話したい</option>
                <option>後日説明を聞きたい</option>
                <option>インターン情報がほしい</option>
                <option>会社見学に興味がある</option>
              </select>
            </label>
            <label>
              自由記述
              <textarea name="comment" rows="4" placeholder="気になった仕事や質問を書いてください"></textarea>
            </label>
            <button class="button primary" type="submit">結果を保存する</button>
            <p class="form-note" id="form-note" role="status"></p>
          </form>
        </div>
      </section>
    </template>

    <script src="app-story.js"></script>
  </body>
</html>
