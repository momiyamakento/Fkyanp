    <template id="story-template">
      <section class="story-prologue">
        <div class="section-inner story-prologue-grid">
          <div class="story-prologue-copy">
            <p class="eyebrow">PROLOGUE / HAKODATE 20XX</p>
            <h1>西暦20XX年、未来の函館に警報が鳴る。</h1>
            <p>
              かつて平和だった街は、突如として現れた巨大怪獣によって破壊され、絶望の淵に立たされていた。
              建物はなぎ倒され、五稜郭も、函館山もピンチに陥っている。
            </p>
            <div class="story-hero-actions">
              <a class="button primary" href="#missions">ヒーロー捜索を開始する</a>
              <a class="button secondary" href="#story-call">緊急通信を読む</a>
            </div>
          </div>
          <aside class="crisis-board" aria-label="函館危機状況">
            <div class="crisis-stamp">CITY ALERT</div>
            <img
              class="crisis-kaiju character-art"
              src="assets/characters/nazogora-full-v2.png"
              width="1536"
              height="1024"
              alt="ナゾゴラ"
              loading="lazy"
              decoding="async"
            />
            <dl>
              <div>
                <dt>五稜郭</dt>
                <dd>防衛線、崩壊寸前</dd>
              </div>
              <div>
                <dt>函館山</dt>
                <dd>通信塔にノイズ発生</dd>
              </div>
              <div>
                <dt>市街地</dt>
                <dd>建物・港・滞在の安心が停止</dd>
              </div>
            </dl>
          </aside>
        </div>
      </section>

      <section class="section story-section story-chapter-band">
        <div class="section-inner">
          <div class="story-chapter-heading">
            <p class="eyebrow dark">STORY 01</p>
            <h2>街は、ヒーローの名前を忘れていた。</h2>
            <p>
              最新鋭の兵器すら通用しない状況の中で、街の人々は怯えるしかなかった。
              本当に必要だった力は、ずっと前から函館を支えていた。
            </p>
          </div>
          <div class="manga-strip" aria-label="物語漫画">
            <article class="manga-panel manga-panel-wide manga-panel-kaiju reveal">
              <span class="manga-page">01</span>
              <p class="manga-sfx" aria-hidden="true">ドォン</p>
              <img
                class="manga-art manga-kaiju-art character-art"
                src="assets/characters/nazogora-full-v2.png"
                width="1536"
                height="1024"
                alt="未来の函館を襲うナゾゴラ"
                loading="lazy"
                decoding="async"
              />
              <div class="manga-caption">
                <h3>巨大怪獣、出現</h3>
                <p>ナゾゴラの一撃で街の機能が止まる。建物、道路、港、旅のやすらぎが次々と沈黙していく。</p>
              </div>
            </article>
            <article class="manga-panel manga-panel-memory reveal">
              <span class="manga-page">02</span>
              <p class="manga-bubble">本当は、街を支えてきた力があった。</p>
              <div class="manga-roster" aria-label="記憶の中で眠る企業ヒーロー">
                <img src="assets/characters/steel-frame-v2.png" width="887" height="1774" alt="スチールフレーム" loading="lazy" decoding="async" />
                <img src="assets/characters/city-builder-v2.png" width="887" height="1774" alt="シティビルダー" loading="lazy" decoding="async" />
                <img src="assets/characters/dock-mechanic-female-v3.png" width="887" height="1774" alt="どっくメカニック" loading="lazy" decoding="async" />
                <img src="assets/characters/century-medic-v2.png" width="864" height="1821" alt="マリーナ・ヒーラー" loading="lazy" decoding="async" />
                <img src="assets/characters/energy-link-fire-v3.png" width="864" height="1821" alt="火属性エナジーリンク" loading="lazy" decoding="async" />
              </div>
              <div class="manga-caption">
                <h3>忘れられた伝説</h3>
                <p>かつて函館には、建物、道路、港、旅のやすらぎを影から支え続けてきた伝説のヒーローたちがいた。</p>
              </div>
            </article>
            <article class="manga-panel manga-panel-call reveal">
              <span class="manga-page">03</span>
              <div class="manga-phone" aria-hidden="true">
                <div class="manga-phone-screen">
                  <span>PARTNER SIGNAL</span>
                  <strong>HERO<br />CALL</strong>
                  <em>受信中...</em>
                </div>
              </div>
              <p class="manga-bubble">おい、そこのお前たち！聞こえるか！？</p>
              <div class="manga-caption">
                <h3>暗号通信、着信</h3>
                <p>相方の声がスマホに響く。知恵と検索の力で、失われたヒーローの本当の姿を突き止めろ。</p>
              </div>
            </article>
          </div>
        </div>
      </section>

      <section class="section story-section" id="story-call">
        <div class="section-inner story-layout story-call-layout">
          <article class="partner-terminal">
            <p class="eyebrow dark">STORY 02 / ENCRYPTED CALL</p>
            <h2>謎の暗号通信が、君のスマホに届いた。</h2>
            <div class="terminal-screen">
              <div class="terminal-status">
                <span></span>
                <strong>PARTNER SIGNAL</strong>
                <em>解析中...</em>
              </div>
              <div class="partner-message">
                <div class="partner-avatar" aria-hidden="true">P</div>
                <blockquote>
                  <p>おい、そこのお前たち！聞こえるか！？</p>
                  <p>
                    街の奴らはみんな忘れちまったが、俺だけは覚えている。
                    かつてこの函館には、建物、道路、港、旅のやすらぎを支えてくれた本物のヒーローたちがいたんだ！
                  </p>
                  <p>
                    怪獣を倒すには、奴らの力が必要だ。お前たちの知恵とスマホの力で、
                    失われたヒーローの本当の姿を突き止め、もう一度この街にスカウトしてくれ！
                  </p>
                </blockquote>
              </div>
            </div>
          </article>
          <div class="signal-panel character-signal story-signal" aria-label="ヒーロー信号">
            <div class="signal-ring"></div>
            <div class="signal-core">HERO<br />CALL</div>
          </div>
        </div>
      </section>

      <section class="section scout-section">
        <div class="section-inner">
          <div class="story-chapter-heading">
            <p class="eyebrow dark">STORY 03 / SCOUT ORDER</p>
            <h2>5人の企業ヒーローを、この順番で仲間に入れろ。</h2>
            <p>
              企業HPや会場ブースを調べ、ヒーローの本当の姿を復元する。
              全員がそろった時、最後のエネルギー砲が起動する。
            </p>
          </div>
          <div class="scout-order" aria-label="ヒーロースカウト順">
            <article class="scout-card reveal" style="--accent:#e95b3c">
              <span>01</span>
              <img class="character-art" src="assets/characters/steel-frame-v2.png" width="887" height="1774" alt="スチールフレーム" loading="lazy" decoding="async" />
              <h3>ショウダイ</h3>
              <p>鉄筋・骨組みの力。怪獣の強烈な一撃を完全に防ぐ最強の盾。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#22a65a">
              <span>02</span>
              <img class="character-art" src="assets/characters/city-builder-v2.png" width="887" height="1774" alt="シティビルダー" loading="lazy" decoding="async" />
              <h3>モリカワ</h3>
              <p>土木・建築・土台の力。地盤を固め、怪獣の足元を崩すグラウンドマスター。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#2676a6">
              <span>03</span>
              <img class="character-art" src="assets/characters/dock-mechanic-female-v3.png" width="887" height="1774" alt="女性版どっくメカニック" loading="lazy" decoding="async" />
              <h3>ハコダテどっく</h3>
              <p>造船・巨大メカの力。海から超巨大決戦兵器を起動する。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#ef7b2d">
              <span>04</span>
              <img class="character-art" src="assets/characters/energy-link-fire-v3.png" width="864" height="1821" alt="火属性エナジーリンク" loading="lazy" decoding="async" />
              <h3>トウコウ</h3>
              <p>防水・外壁改修の火属性。炎の技術で建物を守り、全ヒーローの力を燃え上がらせる。</p>
            </article>
            <article class="scout-card reveal" style="--accent:#c99d47">
              <span>05</span>
              <img class="character-art" src="assets/characters/century-medic-v2.png" width="864" height="1821" alt="マリーナ・ヒーラー" loading="lazy" decoding="async" />
              <h3 class="scout-company-name"><span>センチュリー</span> <span>マリーナ</span></h3>
              <p>ホテル・おもてなしの力。温かな回復の光で、仲間の力を取り戻す。</p>
            </article>
          </div>
          <div class="operation-card">
            <p class="eyebrow dark">MISSION START</p>
            <h2>調べることが、街を救う力になる。</h2>
            <p>
              企業の仕事、技術、街との関わりを調査しよう。謎を解くたびに、忘れられたヒーローの記憶が戻っていく。
            </p>
            <a class="button primary" href="#missions">ミッション一覧へ進む</a>
          </div>
        </div>
      </section>
    </template>

    <template id="missions-template">
      <section class="page-hero compact">
        <div class="page-hero-inner">
          <p class="eyebrow">MISSIONS</p>
          <h1>企業ヒーローを<br class="phone-only" />呼び覚ませ</h1>
          <p>難易度を選んで挑戦。<br class="phone-only" />正解すると企業紹介が解放されます。</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div class="mission-toolbar">
            <div>
              <strong id="progress-label">0 / 5 clear</strong>
              <span>集めたヒーロー</span>
            </div>
            <button class="button ghost" data-action="reset">進行をリセット</button>
          </div>
          <div id="mission-grid" class="mission-grid"></div>
        </div>
      </section>
    </template>

    <template id="mission-template">
      <section class="section mission-page">
        <div class="section-inner mission-detail" id="mission-detail"></div>
      </section>
    </template>

    <template id="companies-template">
      <section class="page-hero compact trusted">
        <div class="page-hero-inner">
          <p class="eyebrow">COMPANIES</p>
          <h1>街を支える企業を知る</h1>
          <p>謎解きで気になった会社をフォローして、ブースで直接話を聞いてみよう。</p>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div id="company-list" class="company-list"></div>
        </div>
      </section>
    </template>

    <template id="company-template">
      <section class="section">
        <div class="section-inner company-detail" id="company-detail"></div>
      </section>
    </template>

    <template id="clear-template">
      <section class="page-hero clear-hero">
        <div class="page-hero-inner">
          <p class="eyebrow">FINAL</p>
          <h1 id="clear-title">ヒーロー集結まで、あと少し。</h1>
          <p id="clear-copy">ミッションをクリアして、フィールド中央の光を完成させよう。</p>
          <a class="button primary" href="#missions">ミッションへ戻る</a>
        </div>
      </section>
      <section class="section">
        <div class="section-inner">
          <div id="hero-collection" class="hero-collection"></div>
          <div id="final-puzzle-area"></div>
          <div id="battle-stage" class="battle-stage"></div>
          <form class="match-form" id="match-form">
            <div class="section-heading">
              <p class="eyebrow dark">NEXT ACTION</p>
              <h2>フォローした会社を残す</h2>
            </div>
            <label>
              名前
              <input name="name" autocomplete="name" placeholder="例: 山田 太郎" />
            </label>
            <label>
              学校名
              <input name="school" placeholder="例: 函館○○高校" />
            </label>
            <label>
              希望する接点
              <select name="contact">
                <option>当日ブースで話したい</option>
                <option>後日説明を聞きたい</option>
                <option>インターン情報がほしい</option>
                <option>会社見学に興味がある</option>
              </select>
            </label>
            <label>
              自由記述
              <textarea name="comment" rows="4" placeholder="フォローした会社への質問や、気になった仕事を書いてください"></textarea>
            </label>
            <button class="button primary" type="submit">結果を保存する</button>
            <p class="form-note" id="form-note" role="status"></p>
          </form>
        </div>
      </section>
    </template>

    <script type="module" src="app-story.js?v=20260723-svg-qa14"></script>
  </body>
</html>
