<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">F-CAN CUP character lineup</title>
  <desc id="desc">A lineup of one friendly kaiju and six company heroes for the F-CAN CUP mystery matching site.</desc>
  <rect width="1400" height="620" fill="#f6f2dc"/>
  <path d="M0 480c225-56 431-65 618-27 220 45 463 20 782-53v220H0z" fill="#dff1d9"/>
  <g fill="none" stroke="#bfd8c5" stroke-width="2" opacity=".75">
    <path d="M0 100h1400M0 180h1400M0 260h1400M0 340h1400M0 420h1400M0 500h1400"/>
    <path d="M100 0v620M200 0v620M300 0v620M400 0v620M500 0v620M600 0v620M700 0v620M800 0v620M900 0v620M1000 0v620M1100 0v620M1200 0v620M1300 0v620"/>
  </g>
  <text x="72" y="82" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="44" font-weight="900">F-CAN CUP Character Design</text>
  <text x="74" y="122" fill="#5d7567" font-family="Yu Gothic, Meiryo, sans-serif" font-size="20" font-weight="700">SVG sprite assets for collection and battle animations</text>

  <g transform="translate(52 150)">
    <rect x="0" y="0" width="220" height="360" rx="0" fill="#fffefa" stroke="#173023" stroke-width="4"/>
    <svg x="10" y="26" width="200" height="220"><use href="characters.svg#kaiju-nazogora"/></svg>
    <text x="110" y="288" text-anchor="middle" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="24" font-weight="900">ナゾゴラ</text>
    <text x="110" y="320" text-anchor="middle" fill="#5d7567" font-family="Yu Gothic, Meiryo, sans-serif" font-size="15" font-weight="700">謎の霧から生まれた怪獣</text>
  </g>

  <g transform="translate(310 170)">
    <svg x="0" y="0" width="150" height="165"><use href="characters.svg#hero-steel"/></svg>
    <text x="75" y="205" text-anchor="middle" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="17" font-weight="900">スチールフレーム</text>
  </g>
  <g transform="translate(480 170)">
    <svg x="0" y="0" width="150" height="165"><use href="characters.svg#hero-health"/></svg>
    <text x="75" y="205" text-anchor="middle" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="17" font-weight="900">ヘルスガーディアン</text>
  </g>
  <g transform="translate(650 170)">
    <svg x="0" y="0" width="150" height="165"><use href="characters.svg#hero-city"/></svg>
    <text x="75" y="205" text-anchor="middle" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="17" font-weight="900">シティビルダー</text>
  </g>
  <g transform="translate(820 170)">
    <svg x="0" y="0" width="150" height="165"><use href="characters.svg#hero-harbor"/></svg>
    <text x="75" y="205" text-anchor="middle" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="17" font-weight="900">ハーバーアンカー</text>
  </g>
  <g transform="translate(990 170)">
    <svg x="0" y="0" width="150" height="165"><use href="characters.svg#hero-lifeline"/></svg>
    <text x="75" y="205" text-anchor="middle" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="17" font-weight="900">ライフラインギア</text>
  </g>
  <g transform="translate(1160 170)">
    <svg x="0" y="0" width="150" height="165"><use href="characters.svg#hero-industrial"/></svg>
    <text x="75" y="205" text-anchor="middle" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif" font-size="17" font-weight="900">ブースター</text>
  </g>

  <g transform="translate(320 445)" fill="#173023" font-family="Yu Gothic, Meiryo, sans-serif">
    <text x="0" y="0" font-size="22" font-weight="900">Design rule</text>
    <text x="0" y="36" font-size="17" font-weight="700">太いアウトライン、紙チケット風の平面色、スマホで読める大きな形。各社の業種を一目で連想できる道具を胸・腕・帽子に入れる。</text>
    <text x="0" y="72" font-size="17" font-weight="700">怪獣は怖すぎず、謎の「?」を弱点にして、ヒーローが集まるほど光で押し返せる設計。</text>
  </g>
</svg>
